name: Job Scraper Bot

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch:        # Allows manual triggering from GitHub UI

permissions:
  contents: write           # Required to push changes back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv

      - name: Run Scraper
        env:
          SST_BOT_TOKEN: ${{ secrets.SST_BOT_TOKEN }}
          SST_BACKEND_JOBS_CHAT_ID: ${{ secrets.SST_BACKEND_JOBS_CHAT_ID }}
          SST_FRONTEND_JOBS_CHAT_ID: ${{ secrets.SST_FRONTEND_JOBS_CHAT_ID }}
          SST_DEVOPS_JOBS_CHAT_ID: ${{ secrets.SST_DEVOPS_JOBS_CHAT_ID }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add sent_jobs.json last_run.json
          # Only commit and push if there are changes to avoid empty commits
          git commit -m "Update state files [skip ci]" || exit 0
          git push