name: Job Scraper Bot

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch:        # Allows you to run it manually from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper
        env:
          SST_BOT_TOKEN: ${{ secrets.SST_BOT_TOKEN }}
          SST_BACKEND_JOBS_CHAT_ID: ${{ secrets.SST_BACKEND_JOBS_CHAT_ID }}
          SST_FRONTEND_JOBS_CHAT_ID: ${{ secrets.SST_FRONTEND_JOBS_CHAT_ID }}
          SST_DEVOPS_JOBS_CHAT_ID: ${{ secrets.SST_DEVOPS_JOBS_CHAT_ID }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add sent_jobs.json
          git commit -m "Update sent_jobs.json [skip ci]" || exit 0
          git push